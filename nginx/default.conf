resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    # ── Homepage ──────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ── Streamlit — ChatLab frontend ──────
    location /chatlab {
        set $upstream streamlit:8501;
        proxy_pass http://$upstream/chatlab;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location /chatlab/_stcore {
        set $upstream streamlit:8501;
        proxy_pass http://$upstream/chatlab/_stcore;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chatlab/_stcore/health {
        set $upstream streamlit:8501;
        proxy_pass http://$upstream/chatlab/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /chatlab/static {
        set $upstream streamlit:8501;
        proxy_pass http://$upstream/chatlab/static;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── FastAPI — ChatLab backend ─────────
    location /api {
        set $upstream api:8000;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
