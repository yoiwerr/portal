resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name yoiwerr.site www.yoiwerr.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yoiwerr.site www.yoiwerr.site;

    ssl_certificate     /etc/letsencrypt/live/yoiwerr.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoiwerr.site/privkey.pem;

    # SSL 加固
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/html text/event-stream;
    gzip_min_length 256;
    gzip_vary on;

    client_max_body_size 50m;

    # 自定义错误页
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── Portal Homepage ──────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Portal static assets
    location /css/   { root /usr/share/nginx/html; expires 7d; }
    location /js/    { root /usr/share/nginx/html; expires 7d; }
    location /bgm/   { root /usr/share/nginx/html; expires 1d; }
    location /photo/ { root /usr/share/nginx/html; expires 7d; }

    # ── ChatLab — standalone HTML ─────────
    location /chatlab {
        alias /usr/share/nginx/html;
        try_files /chatlab.html =404;
    }

    # ── FastAPI — ChatLab backend ─────────
    location /api {
        set $upstream api:8000;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Disable buffering for streaming responses
        proxy_buffering off;
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── MakeItSpecific — AI 工作流增强 ──────
    location = /specific { return 301 /specific/; }

    # Case-insensitive redirects for /Specific /SPECIFIC etc.
    location ~* ^/specific$ { return 301 /specific/; }

    location /specific/ {
        rewrite ^/specific/?(.*)$ /$1 break;
        set $upstream_specific specific-api:8000;
        proxy_pass http://$upstream_specific;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # SSE streaming — disable buffering so events arrive in real-time
        proxy_buffering off;
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
