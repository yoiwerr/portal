resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    # Upload limit — chat screenshots often exceed the 1MB nginx default
    client_max_body_size 50m;

    # ── Portal Homepage ──────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Portal static assets
    location /css/   { root /usr/share/nginx/html; expires 7d; }
    location /js/    { root /usr/share/nginx/html; expires 7d; }
    location /bgm/   { root /usr/share/nginx/html; expires 1d; }
    location /photo/ { root /usr/share/nginx/html; expires 7d; }

    # ── ChatLab — standalone HTML ─────────
    location /chatlab {
        alias /usr/share/nginx/html;
        try_files /chatlab.html =404;
    }

    # ── FastAPI — ChatLab backend ─────────
    location /api {
        set $upstream api:8000;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── MakeItSmooth — AI 工作流增强 ──────
    location = /smooth { return 301 /smooth/; }

    location /smooth/css/ {
        set $upstream smooth-api:8000;
        proxy_pass http://$upstream/css/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /smooth/js/ {
        set $upstream smooth-api:8000;
        proxy_pass http://$upstream/js/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /smooth/api/ {
        set $upstream smooth-api:8000;
        proxy_pass http://$upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /smooth/ {
        set $upstream smooth-api:8000;
        proxy_pass http://$upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
