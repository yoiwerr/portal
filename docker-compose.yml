include:
  - ChatHistoryAnalyst/docker-compose.yml

services:
  nginx:
    image: nginx:alpine
    container_name: portal-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - api
      - streamlit
    restart: unless-stopped
