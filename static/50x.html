<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务暂时不可用 — Portal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f; color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; text-align: center;
  }
  .box { max-width: 480px; padding: 40px 32px; }
  h1 { font-size: 64px; font-weight: 300; color: #6366f1; margin-bottom: 8px; }
  p { font-size: 16px; color: #888; line-height: 1.6; margin-bottom: 24px; }
  a { color: #818cf8; text-decoration: none; }
  #countdown { color: #6366f1; }
</style>
</head>
<body>
<div class="box">
  <h1>503</h1>
  <p>服务暂时不可用，正在恢复中…</p>
  <p>页面将在 <span id="countdown">15</span> 秒后自动刷新</p>
  <p style="font-size:14px"><a href="/">返回首页 →</a></p>
</div>
<script>
  var n = 15;
  var el = document.getElementById('countdown');
  setInterval(function() {
    n--;
    if (n <= 0) location.reload();
    else el.textContent = n;
  }, 1000);
</script>
</body>
</html>
