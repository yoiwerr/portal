<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — AI 工具集</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!-- Navbar -->
<!-- ══════════════════════════════════════════ -->
<nav class="navbar">
    <div class="container">
        <a href="/" class="nav-logo">Projects</a>
        <ul class="nav-links">
            <li><a href="#projects">项目</a></li>
            <li><a href="/chatlab">ChatLab</a></li>
        </ul>
    </div>
</nav>

<!-- ══════════════════════════════════════════ -->
<!-- Hero -->
<!-- ══════════════════════════════════════════ -->
<header class="hero">
    <div class="container">
        <span class="hero-tag">AI · Tools</span>
        <h1>用 AI 理解每一次对话</h1>
        <p class="subtitle">
            基于大语言模型与心理学的对话分析工具集，让 AI 帮你读懂关系中的信号
        </p>
        <div class="hero-actions">
            <a href="/chatlab" class="btn btn-primary">开始使用</a>
            <a href="#projects" class="btn btn-outline">查看项目</a>
        </div>
    </div>
</header>

<!-- ══════════════════════════════════════════ -->
<!-- Projects -->
<!-- ══════════════════════════════════════════ -->
<section class="section" id="projects">
    <div class="container">
        <div class="section-header">
            <h2>项目</h2>
            <p>持续构建中的 AI 应用</p>
        </div>

        <div class="project-grid">

            <!-- ChatLab 卡片 -->
            <a href="/chatlab" class="project-card">
                <div class="card-icon">💬</div>
                <h3>ChatLab</h3>
                <p class="card-desc">
                    AI 驱动的聊天记录分析引擎。模仿对方语气、量化情感状态、洞察关系中的权力动态与沟通氛围。
                </p>
                <div class="card-tags">
                    <span>AI Agent</span>
                    <span>RAG</span>
                    <span>心理学</span>
                </div>
                <span class="btn btn-primary">进入 ChatLab →</span>
            </a>

            <!-- 预留占位卡 -->
            <div class="project-card placeholder">
                <div class="plus">+</div>
                <div class="hint">更多项目即将上线</div>
            </div>

        </div>
    </div>
</section>

<!-- ══════════════════════════════════════════ -->
<!-- Footer -->
<!-- ══════════════════════════════════════════ -->
<footer class="footer">
    <div class="container">
        <span class="footer-copy">&copy; 2026 Projects</span>
        <ul class="footer-links">
            <li><a href="/chatlab">ChatLab</a></li>
            <li><a href="/api/docs">API Docs</a></li>
        </ul>
    </div>
</footer>

</body>
</html>
