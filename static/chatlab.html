<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/chatlab.css">
</head>
<body>

<header class="topbar">
  <a href="/" class="logo">← yoiwerr</a>
  <span class="badge" id="badge"></span>
</header>

<main class="layout">
  <!-- ── Left: Import + Functions (2/3) ── -->
  <section class="left">

    <!-- Import Card -->
    <div class="card import-card" id="importCard">
      <div class="card-hd">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>导入聊天记录</span>
      </div>
      <div class="drop" id="dz">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="drop-ic"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p class="drop-tx">拖拽文件或点击选择</p>
        <p class="drop-hi" id="fh">TXT · JSON · PNG · JPG · WebP</p>
      </div>
      <input type="file" id="fi" hidden accept=".txt,.json,.png,.jpg,.jpeg,.webp">
      <textarea class="fg-ta" id="mi" placeholder="或直接粘贴聊天记录…&#10;[小z 10:05]: 你好呀" rows="2"></textarea>
      <div class="fg-row">
        <input class="fg-in" id="ti" placeholder="对方昵称" value="对方">
        <label class="chk"><input type="checkbox" id="rc"><span>存入记忆库</span></label>
      </div>
      <textarea class="fg-ta" id="bi" placeholder="补充背景（选填）…" rows="1"></textarea>
      <button class="sub" id="bs">解析并载入</button>
    </div>

    <!-- Function Cards -->
    <div class="fn-cards">
      <button class="card fn-card" id="btnImitate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <span class="fn-label">模仿回复</span>
        <span class="fn-hint">AI 模仿对方语气生成回复</span>
      </button>
      <button class="card fn-card" id="btnEmotion">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span class="fn-label">情感分析</span>
        <span class="fn-hint">量化情感倾向与主导情绪</span>
      </button>
      <button class="card fn-card" id="btnAtmosphere">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>
        <span class="fn-label">气氛分析</span>
        <span class="fn-hint">洞察关系氛围与权力动态</span>
      </button>
    </div>
  </section>

  <!-- ── Right: Preview Panel (1/3) ── -->
  <aside class="right" id="previewPanel">
    <div class="preview-empty" id="previewEmpty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.25"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
      <p>导入聊天记录后<br>这里将显示预览</p>
    </div>
    <div class="preview-content" id="previewContent" style="display:none;">
      <div class="preview-bar" id="previewBar"></div>
      <div class="preview-msgs" id="previewMsgs"></div>
    </div>
  </aside>
</main>

<!-- Modal (for analysis results) -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-hd">
      <h2 class="modal-ti" id="modalTitle"></h2>
      <button class="modal-x" id="modalClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-bd" id="modalBody"></div>
  </div>
</div>

<script src="/js/chatlab.js"></script>
</body>
</html>
